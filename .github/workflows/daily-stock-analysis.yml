name: A股大盘每日分析推送

on:
  schedule:
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run analysis
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python a_stock_daily_analysis.py

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report
          path: report.txt
          retention-days: 7
